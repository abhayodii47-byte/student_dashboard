
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Dashboard</title>
<style>
  /* Reset some defaults */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: Arial, sans-serif;
    background-color: #f0f4f8;
    color: #222;
    padding: 20px;
  }

  /* Header */
  h1 {
    text-align: center;
    font-size: 28px;
    margin-bottom: 24px;
    color: #1a73e8;
  }

  /* Grid layout for cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }

  /* Card style */
  .card {
    background-color: #ffffff;
    border: 1px solid #d0e0f0;
    border-radius: 10px;
    padding: 20px;
  }

  /* Card hover effect */
  .card:hover {
    border-color: #1a73e8;
  }

  /* Card title */
  .card h2 {
    font-size: 16px;
    margin-bottom: 14px;
    color: #1a73e8;
    border-bottom: 1px solid #e0ecff;
    padding-bottom: 8px;
  }

  /* Date/time display */
  #datetime {
    font-size: 15px;
    color: #333;
    line-height: 1.7;
  }

  /* Input and button shared styles */
  input[type="text"],
  input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 10px;
  }

  input[type="text"]:focus,
  input[type="number"]:focus {
    outline: none;
    border-color: #1a73e8;
  }

  button {
    padding: 8px 14px;
    background-color: #1a73e8;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }

  button:hover {
    background-color: #1558b0;
  }

  /* To-do list */
  #task-list {
    list-style: none;
    margin-top: 12px;
  }

  #task-list li {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #f5f9ff;
    border: 1px solid #d0e0f0;
    border-radius: 6px;
    padding: 7px 10px;
    margin-bottom: 7px;
    font-size: 14px;
  }

  /* Delete button inside task */
  .del-btn {
    background-color: #e74c3c;
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 5px;
    margin-left: 8px;
    flex-shrink: 0;
  }

  .del-btn:hover {
    background-color: #c0392b;
  }

  /* Timer display */
  #timer-display {
    font-size: 36px;
    font-weight: bold;
    text-align: center;
    color: #333;
    margin: 10px 0 16px;
    letter-spacing: 2px;
  }

  .timer-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .timer-buttons button {
    min-width: 80px;
  }

  #stop-btn {
    background-color: #e74c3c;
  }

  #stop-btn:hover {
    background-color: #c0392b;
  }

  #reset-btn {
    background-color: #888;
  }

  #reset-btn:hover {
    background-color: #666;
  }

  /* BMI result */
  #bmi-result {
    margin-top: 12px;
    font-size: 15px;
    font-weight: bold;
    color: #333;
    min-height: 22px;
  }

  /* Two-column inputs for BMI */
  .bmi-inputs {
    display: flex;
    gap: 10px;
  }

  .bmi-inputs input {
    flex: 1;
    min-width: 0;
  }
</style>
</head>
<body>

<h1>Student Dashboard</h1>

<div class="grid">

  <!-- SECTION 1: Date and Time -->
  <div class="card">
    <h2>Current Date &amp; Time</h2>
    <div id="datetime">Loading...</div>
  </div>

  <!-- SECTION 2: To-Do List -->
  <div class="card">
    <h2>To-Do List</h2>
    <input type="text" id="task-input" placeholder="Add a new task..." />
    <button onclick="addTask()">Add Task</button>
    <ul id="task-list"></ul>
  </div>

  <!-- SECTION 3: Study Timer -->
  <div class="card">
    <h2>Study Timer</h2>
    <div id="timer-display">00:00</div>
    <div class="timer-buttons">
      <button id="start-btn" onclick="startTimer()">Start</button>
      <button id="stop-btn" onclick="stopTimer()">Stop</button>
      <button id="reset-btn" onclick="resetTimer()">Reset</button>
    </div>
  </div>

  <!-- SECTION 4: BMI Calculator -->
  <div class="card">
    <h2>BMI Calculator</h2>
    <div class="bmi-inputs">
      <input type="number" id="height-input" placeholder="Height (cm)" min="50" max="250" />
      <input type="number" id="weight-input" placeholder="Weight (kg)" min="10" max="300" />
    </div>
    <button onclick="calcBMI()">Calculate BMI</button>
    <div id="bmi-result"></div>
  </div>

</div>

<script>
  // ---- SECTION 1: Date and Time ----

  // This function gets the current date and time and shows it
  function showTime() {
    var now = new Date();

    var days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    var dayName = days[now.getDay()];
    var date = now.getDate();
    var month = months[now.getMonth()];
    var year = now.getFullYear();

    var hours = now.getHours();
    var minutes = now.getMinutes();
    var seconds = now.getSeconds();
    var ampm = hours >= 12 ? "PM" : "AM";

    // Convert to 12-hour format
    hours = hours % 12;
    if (hours == 0) hours = 12;

    // Add a zero in front if number is less than 10
    if (minutes < 10) minutes = "0" + minutes;
    if (seconds < 10) seconds = "0" + seconds;

    var dateStr = dayName + ", " + date + " " + month + " " + year;
    var timeStr = hours + ":" + minutes + ":" + seconds + " " + ampm;

    document.getElementById("datetime").innerHTML = dateStr + "<br>" + timeStr;
  }

  // Run showTime every 1 second (1000 ms)
  setInterval(showTime, 1000);
  showTime(); // run once right away too


  // ---- SECTION 2: To-Do List ----

  // This adds a new task to the list
  function addTask() {
    var input = document.getElementById("task-input");
    var taskText = input.value.trim();

    // Don't add if the input is empty
    if (taskText == "") {
      alert("Please type a task first!");
      return;
    }

    // Create a new list item
    var li = document.createElement("li");
    li.innerHTML = '<span>' + taskText + '</span><button class="del-btn" onclick="deleteTask(this)">Delete</button>';

    // Add it to the list
    document.getElementById("task-list").appendChild(li);

    // Clear the input box
    input.value = "";
  }

  // This deletes a task when delete button is clicked
  function deleteTask(btn) {
    // btn.parentElement is the <li> that contains the button
    var li = btn.parentElement;
    li.remove();
  }

  // Allow pressing Enter to add a task
  document.getElementById("task-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") addTask();
  });


  // ---- SECTION 3: Study Timer ----

  var timerSeconds = 0;   // how many seconds have passed
  var timerRunning = false; // is the timer on or off?
  var timerInterval = null; // stores the interval so we can stop it

  // This runs every second when timer is on
  function tick() {
    timerSeconds = timerSeconds + 1;
    updateTimerDisplay();
  }

  // Show the time nicely on screen
  function updateTimerDisplay() {
    var mins = Math.floor(timerSeconds / 60);
    var secs = timerSeconds % 60;
    if (mins < 10) mins = "0" + mins;
    if (secs < 10) secs = "0" + secs;
    document.getElementById("timer-display").innerText = mins + ":" + secs;
  }

  function startTimer() {
    if (timerRunning) return; // don't start again if already running
    timerRunning = true;
    timerInterval = setInterval(tick, 1000);
  }

  function stopTimer() {
    timerRunning = false;
    clearInterval(timerInterval);
  }

  function resetTimer() {
    stopTimer();
    timerSeconds = 0;
    updateTimerDisplay();
  }


  // ---- SECTION 4: BMI Calculator ----

  function calcBMI() {
    var heightCm = parseFloat(document.getElementById("height-input").value);
    var weightKg = parseFloat(document.getElementById("weight-input").value);
    var resultDiv = document.getElementById("bmi-result");

    // Check if inputs are valid numbers
    if (isNaN(heightCm) || isNaN(weightKg) || heightCm <= 0 || weightKg <= 0) {
      resultDiv.style.color = "#e74c3c";
      resultDiv.innerText = "Please enter valid height and weight.";
      return;
    }

    // BMI formula: weight(kg) / height(m)^2
    var heightM = heightCm / 100;
    var bmi = weightKg / (heightM * heightM);
    bmi = bmi.toFixed(1); // round to 1 decimal

    // Decide the category
    var category = "";
    if (bmi < 18.5) {
      category = "Underweight";
    } else if (bmi < 25) {
      category = "Normal weight";
    } else if (bmi < 30) {
      category = "Overweight";
    } else {
      category = "Obese";
    }

    resultDiv.style.color = "#1a73e8";
    resultDiv.innerText = "Your BMI: " + bmi + " (" + category + ")";
  }
</script>

</body>
</html>
